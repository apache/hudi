name: Hudi Trino SPI Compatibility

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

env:
  MVN_ARGS: -e -ntp -B -V -Dgpg.skip -Djacoco.skip

jobs:
  compile-against-trino-master:
    name: Compile hudi-trino-plugin against trinodb/trino master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hudi
        uses: actions/checkout@v5
        with:
          path: hudi
      - name: Checkout trinodb/trino master
        uses: actions/checkout@v5
        with:
          repository: trinodb/trino
          ref: master
          path: trino
      # Hudi targets Java 11 and uses Lombok 1.18.36, which does not run on JDK 25.
      # Install the upstream Hudi modules under JDK 17 first, then compile the connector
      # under JDK 25.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install upstream Hudi modules (JDK 17)
        working-directory: hudi
        run: mvn $MVN_ARGS install -pl :hudi-common,:hudi-hive-sync,:hudi-io,:hudi-sync-common -am -Dmaven.test.skip=true -Drat.skip -Dcheckstyle.skip
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Read Trino SPI version
        id: trino-version
        run: |
          # trinodb/trino's root pom declares <version>NNN-SNAPSHOT</version>; strip the suffix.
          VERSION=$(grep -m1 '<version>' trino/pom.xml | sed -E 's|.*<version>([0-9]+)(-SNAPSHOT)?</version>.*|\1|')
          echo "trino_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Trino version: $VERSION"
      - name: Compile hudi-trino-plugin against current Trino SPI (JDK 25)
        working-directory: hudi
        run: |
          mvn $MVN_ARGS -Phudi-trino \
            -Dtrino.connector.version=${{ steps.trino-version.outputs.trino_version }} \
            -pl hudi-trino-plugin compile
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `hudi-trino-plugin SPI drift detected against Trino ${{ steps.trino-version.outputs.trino_version }}`,
              body: `Nightly compatibility build failed. See run ${context.runId}.`
            });
