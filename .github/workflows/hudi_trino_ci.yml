name: Hudi Trino Connector CI

on:
  push:
    branches:
      - master
      - 'release-*'
    paths:
      - 'hudi-trino-plugin/**'
      - '.github/workflows/hudi_trino_ci.yml'
  pull_request:
    branches:
      - master
      - 'release-*'
    paths:
      - 'hudi-trino-plugin/**'
      - '.github/workflows/hudi_trino_ci.yml'
  workflow_dispatch:

concurrency:
  group: hudi-trino-ci-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'master') && !contains(github.ref, 'release-') }}

env:
  MVN_ARGS: -e -ntp -B -V -Dgpg.skip -Djacoco.skip -Pwarn-log

jobs:
  build-and-test:
    name: Build connector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Hudi targets Java 11 and uses Lombok 1.18.36, which does not run on JDK 25.
      # Build the upstream modules hudi-trino-plugin depends on under JDK 17 first,
      # install them into the local m2, then build the connector itself under JDK 25.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install upstream Hudi modules (JDK 17)
        run: mvn $MVN_ARGS install -pl :hudi-common,:hudi-hive-sync,:hudi-io,:hudi-sync-common -am -Dmaven.test.skip=true -Drat.skip -Dcheckstyle.skip
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # Tests live behind the hudi-trino-tests profile (Trino does not publish the
      # test-jars we need). -Dmaven.test.skip=true skips test compilation so the build
      # resolves cleanly against Maven Central.
      - name: Build connector (JDK 25)
        run: mvn $MVN_ARGS -Phudi-trino -pl hudi-trino-plugin install -Dmaven.test.skip=true
