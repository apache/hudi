name: Hudi Trino Connector CI

on:
  push:
    branches:
      - master
      - 'release-*'
    paths:
      - 'hudi-trino-plugin/**'
      - '.github/workflows/hudi_trino_ci.yml'
  pull_request:
    branches:
      - master
      - 'release-*'
    paths:
      - 'hudi-trino-plugin/**'
      - '.github/workflows/hudi_trino_ci.yml'
  workflow_dispatch:

concurrency:
  group: hudi-trino-ci-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'master') && !contains(github.ref, 'release-') }}

env:
  MVN_ARGS: -e -ntp -B -V -Dgpg.skip -Djacoco.skip -Pwarn-log

jobs:
  build-and-test:
    name: Build and Test (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build connector
        run: ./mvnw $MVN_ARGS -Phudi-trino -pl hudi-trino-plugin -am install -DskipTests
      - name: Run connector tests
        run: ./mvnw $MVN_ARGS -Phudi-trino -pl hudi-trino-plugin test
