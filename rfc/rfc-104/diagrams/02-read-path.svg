<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-labelledby="title desc">
  <title id="title">RFC-104 vector search read path</title>
  <desc id="desc">Read path loads vector metadata, probes centroids, scans postings, scores RaBitQ codes, reads base vectors, and exact reranks candidates.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect width="1160" height="560" fill="#f8fafc"/>
  <text x="580" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Vector Query Read Path</text>
  <text x="580" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">MDT narrows candidates; exact ranking uses base-table VECTOR(D)</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="40" y="125" width="140" height="82" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="110" y="154" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Query vector</text>
    <text x="110" y="181" text-anchor="middle" font-size="13" fill="#1e40af">q VECTOR(D)</text>

    <rect x="225" y="112" width="160" height="108" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="305" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Metadata cache</text>
    <text x="305" y="166" text-anchor="middle" font-size="12" fill="#14532d">manifest</text>
    <text x="305" y="184" text-anchor="middle" font-size="12" fill="#14532d">centroids</text>
    <text x="305" y="202" text-anchor="middle" font-size="12" fill="#14532d">quantizer + clusters</text>

    <rect x="430" y="112" width="155" height="108" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="508" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">Probe IVF</text>
    <text x="508" y="169" text-anchor="middle" font-size="12" fill="#3730a3">query vs K centroids</text>
    <text x="508" y="191" text-anchor="middle" font-size="12" fill="#3730a3">select top-P clusters</text>

    <rect x="630" y="112" width="180" height="108" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="720" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Scan postings</text>
    <text x="720" y="169" text-anchor="middle" font-size="12" fill="#92400e">P|G|cluster|shard|*</text>
    <text x="720" y="191" text-anchor="middle" font-size="12" fill="#92400e">selected cluster shards</text>

    <rect x="855" y="112" width="150" height="108" rx="12" fill="#fae8ff" stroke="#a855f7" stroke-width="2"/>
    <text x="930" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#6b21a8">RaBitQ score</text>
    <text x="930" y="169" text-anchor="middle" font-size="12" fill="#6b21a8">popcount XOR</text>
    <text x="930" y="191" text-anchor="middle" font-size="12" fill="#6b21a8">top-R shortlist</text>

    <path d="M180 166 H222" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M385 166 H427" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M585 166 H627" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M810 166 H852" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="180" y="315" width="270" height="100" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="315" y="345" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">Read candidate rows</text>
    <text x="315" y="373" text-anchor="middle" font-size="13" fill="#1e40af">fileGroupId + partitionPath from postings</text>
    <text x="315" y="395" text-anchor="middle" font-size="13" fill="#1e40af">fetch original VECTOR(D)</text>

    <rect x="520" y="315" width="220" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="630" y="345" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">Exact re-rank</text>
    <text x="630" y="373" text-anchor="middle" font-size="13" fill="#14532d">compute exact distance</text>
    <text x="630" y="395" text-anchor="middle" font-size="13" fill="#14532d">sort candidates</text>

    <rect x="810" y="315" width="150" height="100" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="885" y="354" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">Top-K</text>
    <text x="885" y="382" text-anchor="middle" font-size="13" fill="#991b1b">final results</text>

    <path d="M930 220 C930 270, 315 270, 315 312" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M450 365 H517" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M740 365 H807" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(90,470)" font-family="Arial, sans-serif">
    <rect width="980" height="48" rx="10" fill="#e2e8f0"/>
    <text x="490" y="30" text-anchor="middle" font-size="14" fill="#334155">Batched queries group by selected cluster/shard so each posting range is scanned once and scored for multiple query vectors.</text>
  </g>
</svg>
