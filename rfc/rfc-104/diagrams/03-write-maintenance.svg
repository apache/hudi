<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">RFC-104 vector index bootstrap write and maintenance path</title>
  <desc id="desc">Spark bootstrap trains centroids and writes postings. Incremental writes encode new postings. LIRE maintenance refreshes affected clusters and publishes a new generation or delta.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect width="1160" height="620" fill="#f8fafc"/>
  <text x="580" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Bootstrap, Writes, and LIRE Maintenance</text>
  <text x="580" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Spark builds and refreshes MDT vector generations without storing index payloads in base files</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <text x="70" y="118" font-size="18" font-weight="700" fill="#1e40af">Bootstrap / rebuild</text>
    <rect x="70" y="140" width="160" height="78" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Read snapshot</text>
    <text x="150" y="194" text-anchor="middle" font-size="12" fill="#1e40af">record + VECTOR(D)</text>
    <rect x="290" y="140" width="160" height="78" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="370" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">KMeans</text>
    <text x="370" y="194" text-anchor="middle" font-size="12" fill="#3730a3">train IVF centroids</text>
    <rect x="510" y="140" width="180" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="600" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Assign + RaBitQ</text>
    <text x="600" y="194" text-anchor="middle" font-size="12" fill="#92400e">cluster, shard, code</text>
    <rect x="750" y="140" width="230" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="865" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Write MDT generation</text>
    <text x="865" y="194" text-anchor="middle" font-size="12" fill="#14532d">__centroids__, M|, C|, P|</text>
    <path d="M230 179 H287" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M450 179 H507" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M690 179 H747" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <text x="70" y="288" font-size="18" font-weight="700" fill="#9a3412">Incremental insert / vector update / delete</text>
    <rect x="70" y="310" width="185" height="78" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="162" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Changed record</text>
    <text x="162" y="364" text-anchor="middle" font-size="12" fill="#9a3412">new vector or tombstone</text>
    <rect x="315" y="310" width="185" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="407" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Encode posting</text>
    <text x="407" y="364" text-anchor="middle" font-size="12" fill="#92400e">nearest centroid + RaBitQ</text>
    <rect x="560" y="310" width="220" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="670" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Upsert P| row</text>
    <text x="670" y="364" text-anchor="middle" font-size="12" fill="#14532d">or invalidate stale posting</text>
    <rect x="840" y="310" width="190" height="78" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="935" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Reader invariant</text>
    <text x="935" y="364" text-anchor="middle" font-size="12" fill="#991b1b">no stale live candidates</text>
    <path d="M255 349 H312" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M500 349 H557" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M780 349 H837" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <text x="70" y="458" font-size="18" font-weight="700" fill="#14532d">LIRE-style maintenance</text>
    <rect x="70" y="480" width="190" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="165" y="511" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Detect drift</text>
    <text x="165" y="534" text-anchor="middle" font-size="12" fill="#14532d">imbalance, NPA, clustering</text>
    <rect x="320" y="480" width="210" height="78" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="425" y="511" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Scan affected ranges</text>
    <text x="425" y="534" text-anchor="middle" font-size="12" fill="#14532d">C|cluster and P|cluster|*</text>
    <rect x="590" y="480" width="210" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="695" y="511" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Refresh metadata</text>
    <text x="695" y="534" text-anchor="middle" font-size="12" fill="#92400e">centroids, C|, P| rows</text>
    <rect x="860" y="480" width="210" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="965" y="511" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Publish visibility</text>
    <text x="965" y="534" text-anchor="middle" font-size="12" fill="#14532d">new generation or delta</text>
    <path d="M260 519 H317" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M530 519 H587" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M800 519 H857" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
