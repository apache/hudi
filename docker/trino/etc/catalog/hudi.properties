# Native trino-hudi connector (from hudi-trino-plugin/, artifact trino-hudi).
# Pre-Trino 472 the only way to read Hudi was the hive-connector + hudi-trino-bundle shim;
# this is the native replacement, hence connector.name=hudi.
connector.name=hudi
hive.metastore=thrift
hive.metastore.uri=thrift://hivemetastore:9083
# trino-filesystem-manager flag that turns on the legacy Hadoop FileSystem path
# (HDFS via fs.defaultFS in hive.config.resources). Without this the plugin can't
# read hdfs:// URIs in Trino 460+.
fs.hadoop.enabled=true
hive.config.resources=/etc/trino/hadoop-conf/core-site.xml,/etc/trino/hadoop-conf/hdfs-site.xml
