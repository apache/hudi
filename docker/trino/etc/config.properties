# Single-node Trino: the coordinator also runs splits. Good enough for E2E,
# halves container startup vs a separate worker.
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://trinocoordinator:8080
query.max-memory=2GB
query.max-memory-per-node=1GB
